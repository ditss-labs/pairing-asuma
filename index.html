<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asuma Bot - Pairing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-card {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .status-card.pending {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
        }

        .status-card.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .status-card.expired {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .code-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 8px;
            margin: 15px 0;
            border: 2px dashed #667eea;
        }

        .timer {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Asuma Bot Pairing</h1>
        <p class="subtitle">Masukkan nomor WhatsApp untuk mendapatkan kode pairing</p>
        
        <div class="form-group">
            <label for="phone">Nomor WhatsApp</label>
            <input 
                type="text" 
                id="phone" 
                placeholder="Contoh: 628123456789"
                value="6281513607731"
            >
        </div>
        
        <button id="submitBtn" onclick="requestPairing()">
            Request Kode Pairing
        </button>
        
        <div id="statusCard" class="status-card">
            <div id="statusMessage"></div>
            <div id="codeDisplay" class="code-box" style="display: none;"></div>
            <div id="timerDisplay" class="timer"></div>
        </div>
        
        <p class="info-text">
            Kode akan dikirim oleh bot. Tunggu beberapa saat.
        </p>
    </div>

    <script>
        let checkInterval;
        let countdownInterval;

        async function requestPairing() {
            const phone = document.getElementById('phone').value.replace(/\D/g, '');
            const btn = document.getElementById('submitBtn');
            const statusCard = document.getElementById('statusCard');
            
            // Validasi
            if (!phone || phone.length < 10) {
                showStatus('error', 'Masukkan nomor yang valid (minimal 10 digit)');
                return;
            }

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Memproses...';
            
            // Reset tampilan
            statusCard.style.display = 'none';
            
            // Hentikan interval sebelumnya
            if (checkInterval) clearInterval(checkInterval);
            if (countdownInterval) clearInterval(countdownInterval);

            try {
                // Request ke server
                const response = await fetch('/api/pairing/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('pending', '✅ Permintaan diterima! Menunggu kode pairing...');
                    
                    // Mulai cek status
                    checkInterval = setInterval(() => checkStatus(phone), 2000);
                    startCountdown(result.data.expiresAt);
                } else {
                    showStatus('error', '❌ ' + result.message);
                    resetButton();
                }
                
            } catch (error) {
                showStatus('error', '❌ Gagal terhubung ke server');
                resetButton();
            }
        }

        async function checkStatus(phone) {
            try {
                const response = await fetch(`/api/pairing/status/${phone}`);
                const result = await response.json();
                
                if (!result.success) return;
                
                const data = result.data;
                
                switch(data.status) {
                    case 'sent':
                        // Kode sudah dikirim
                        clearInterval(checkInterval);
                        showStatus('success', '✅ Kode pairing berhasil didapatkan!');
                        document.getElementById('codeDisplay').style.display = 'block';
                        document.getElementById('codeDisplay').innerHTML = formatCode(data.code);
                        document.getElementById('timerDisplay').innerHTML = '';
                        resetButton();
                        break;
                        
                    case 'expired':
                        clearInterval(checkInterval);
                        showStatus('expired', '⏰ Waktu habis! Silakan request ulang.');
                        document.getElementById('codeDisplay').style.display = 'none';
                        resetButton();
                        break;
                        
                    case 'pending':
                    case 'processing':
                        // Masih menunggu
                        showStatus('pending', '⏳ Menunggu bot merespon...');
                        break;
                        
                    case 'not_found':
                        // Nomor tidak ditemukan
                        clearInterval(checkInterval);
                        showStatus('error', '❌ Nomor tidak ditemukan');
                        resetButton();
                        break;
                }
                
            } catch (error) {
                console.error('Check status error:', error);
            }
        }

        function startCountdown(expiresAt) {
            const timerDisplay = document.getElementById('timerDisplay');
            
            countdownInterval = setInterval(() => {
                const now = new Date();
                const expiry = new Date(expiresAt);
                const diff = expiry - now;
                
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    timerDisplay.innerHTML = 'Waktu habis';
                    return;
                }
                
                const minutes = Math.floor(diff / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                timerDisplay.innerHTML = `⏱️ Sisa waktu: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                
            }, 1000);
        }

        function formatCode(code) {
            if (!code) return '';
            // Format: XXXX-XXXX-XXXX
            return code.match(/.{1,4}/g).join('-') || code;
        }

        function showStatus(type, message) {
            const statusCard = document.getElementById('statusCard');
            const statusMessage = document.getElementById('statusMessage');
            
            statusCard.style.display = 'block';
            statusCard.className = `status-card ${type}`;
            statusMessage.innerHTML = message;
        }

        function resetButton() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.innerHTML = 'Request Kode Pairing';
        }
    </script>
</body>
              </html>
