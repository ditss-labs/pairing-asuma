            width: 100%;
            height: 100%;

                linear-gradient(rgba(79, 70, 229, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 70, 229, 0.05) 1px, transparent 1px);

        .container {

        /* Decorative elements */

            position: absolute;

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }

        /* Brand / Header */

        .brand-icon {

        .brand-icon i {

        /* Loading spinner */

<body>
    <div class="container">
        <div class="decor-1"></div>
        <div class="decor-2"></div>

        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-robot"></i>
            </div>
            <h1>Asuma Bot</h1>
            <div class="sub">Pairing Code Generator</div>
        </div>

        <div class="card">
            <div class="input-wrapper">
                <label class="input-label">
                    <i class="fas fa-phone-alt"></i>
                    <span>Nomor WhatsApp</span>
                </label>
                <div class="input-field">
                    <i class="fas fa-hashtag"></i>
                    <input type="text" id="phone" placeholder="628123456789" value="" autocomplete="off">
                </div>
            </div>

            <button class="btn" id="submitBtn" onclick="requestPairing()">
                <i class="fas fa-key"></i>
                <span>Request Kode Pairing</span>
            </button>

            <!-- Status Card -->
            <div id="statusCard" class="status-card">
                <div class="status-header">
                    <div class="status-icon-box" id="statusIconBox">
                        <i class="fas fa-clock" id="statusIcon"></i>
                    </div>
                    <div class="status-title">
                        <h3 id="statusTitle">Menunggu</h3>
                        <p id="statusMessage">Memproses permintaan...</p>
                    </div>
                </div>
                <div class="status-body">
                    <div id="codeDisplay" class="code-box hidden">
                        <span id="codeValue">GNMC-S24C</span>
                    </div>
                    <div id="timerDisplay" class="timer hidden">
                        <i class="fas fa-hourglass-half"></i>
                        <span id="timerText">05:00</span>
                    </div>
                    <div id="whatsappAction" class="hidden">
                        <a href="#" id="whatsappLink" class="whatsapp-button" target="_blank">
                            <i class="fab fa-whatsapp"></i> Buka WhatsApp
                        </a>
                        <div class="steps-guide">
                            <div class="step-item"><i class="fas fa-mobile-alt"></i> Buka WhatsApp di HP</div>
                            <div class="step-item"><i class="fas fa-keyboard"></i> Masukkan kode pairing</div>
                            <div class="step-item"><i class="fas fa-check-circle"></i> Tunggu hingga terhubung</div>
                        </div>
                    </div>
                    <div id="connectedAction" class="hidden">
                        <div class="connected-badge">
                            <i class="fas fa-check-circle"></i>
                            <div>
                                <div style="font-weight:700; font-size:1.1rem;">Bot Connected</div>
                                <div style="font-size:0.85rem; opacity:0.8;">WhatsApp siap digunakan</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <span>© 2026 Asuma Bot</span>
            <div class="footer-links">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </div>

<script>
    let checkInterval = null;
    let countdownInterval = null;
    let currentPhone = '';

    function showElement(el) { el?.classList.remove('hidden'); }
    function hideElement(el) { el?.classList.add('hidden'); }

    function setStatusUI(type, icon, title, message) {
        const card = document.getElementById('statusCard');
        const iconElem = document.getElementById('statusIcon');
        const titleElem = document.getElementById('statusTitle');
        const msgElem = document.getElementById('statusMessage');
        const iconBox = document.getElementById('statusIconBox');

        iconElem.className = `fas fa-${icon}`;
        let bgColor = '#1f2542';
        if (type === 'success') bgColor = '#1f3a2b';
        else if (type === 'connected') bgColor = '#1f3a4b';
        else if (type === 'error' || type === 'expired') bgColor = '#3a2b2b';
        else if (type === 'waiting') bgColor = '#3a322b';
        iconBox.style.background = bgColor;

        titleElem.innerText = title;
        msgElem.innerText = message;
        card.style.display = 'block';
    }

    function resetUI() {
        hideElement(document.getElementById('codeDisplay'));
        hideElement(document.getElementById('timerDisplay'));
        hideElement(document.getElementById('whatsappAction'));
        hideElement(document.getElementById('connectedAction'));
        document.getElementById('statusCard').style.display = 'none';
        clearIntervals();
    }

    function clearIntervals() {
        if (checkInterval) clearInterval(checkInterval);
        if (countdownInterval) clearInterval(countdownInterval);
    }

    function resetButton() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-key"></i><span>Request Kode Pairing</span>';
    }

    function startCountdown(expiryDate) {
        const timerDiv = document.getElementById('timerDisplay');
        const timerText = document.getElementById('timerText');
        showElement(timerDiv);

        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            const now = new Date();
            const expiry = new Date(expiryDate);
            const diff = expiry - now;
            if (diff <= 0) {
                timerText.innerText = '00:00';
                clearInterval(countdownInterval);
            } else {
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                timerText.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }
        }, 1000);
    }

    async function requestPairing() {
        const phoneInput = document.getElementById('phone');
        const phone = phoneInput.value.replace(/\D/g, '');
        const btn = document.getElementById('submitBtn');

        if (!phone || phone.length < 10) {
            alert('Masukkan nomor WhatsApp yang valid (minimal 10 digit)');
            return;
        }

        currentPhone = phone;
        localStorage.setItem('lastPhone', phone);

        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div><span>Memproses...</span>';

        resetUI();

        try {
            const response = await fetch('/api/pairing/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            const result = await response.json();

            if (result.success) {
                setStatusUI('waiting', 'clock', 'Permintaan Diterima', 'Menunggu bot menghasilkan kode...');
                if (checkInterval) clearInterval(checkInterval);
                checkInterval = setInterval(() => checkStatus(phone), 2000);
            } else {
                setStatusUI('error', 'exclamation-triangle', 'Gagal', result.message || 'Terjadi kesalahan');
                resetButton();
            }
        } catch (error) {
            setStatusUI('error', 'bolt', 'Error', 'Gagal terhubung ke server');
            resetButton();
        }
    }

    async function checkStatus(phone) {
        try {
            const response = await fetch(`/api/pairing/status/${phone}`);
            const result = await response.json();
            if (!result.success) return;

            const data = result.data;

            // CEK STATUS CONNECTED DULU (prioritas utama)
            if (data.status === 'connected') {
                clearIntervals();               // Hentikan semua pengecekan
                setStatusUI('connected', 'check-circle', 'Bot Connected', 'WhatsApp berhasil terhubung');
                showElement(document.getElementById('connectedAction'));
                hideElement(document.getElementById('codeDisplay'));
                hideElement(document.getElementById('timerDisplay'));
                hideElement(document.getElementById('whatsappAction'));
                resetButton();                  // Aktifkan tombol lagi jika ingin request ulang
                return;                          // Keluar, jangan lanjut ke switch
            }

            // Cek expired (hanya jika belum connected)
            const now = new Date();
            const expiry = new Date(data.expiresAt);
            if (now > expiry && data.status !== 'connected' && data.status !== 'expired') {
                clearIntervals();
                setStatusUI('expired', 'hourglass-end', 'Kode Expired', 'Waktu habis, silakan request ulang');
                resetButton();
                return;
            }

            // Handle status lainnya
            switch (data.status) {
                case 'pairing_code':
                    clearInterval(checkInterval); // Stop polling karena kode sudah dapat
                    setStatusUI('success', 'gem', 'Kode Pairing Siap', 'Masukkan kode berikut di WhatsApp:');
                    document.getElementById('codeValue').innerText = data.code || 'GNMC-S24C';
                    showElement(document.getElementById('codeDisplay'));
                    showElement(document.getElementById('whatsappAction'));
                    hideElement(document.getElementById('connectedAction'));
                    startCountdown(expiry);
                    break;

                case 'processing':
                case 'pending':
                    setStatusUI('waiting', 'spinner', 'Memproses', 'Bot sedang menyiapkan kode...');
                    break;

                case 'sent':
                    setStatusUI('waiting', 'paper-plane', 'Kode Terkirim', 'Kode sudah dikirim, cek WhatsApp Anda');
                    break;

                case 'expired':
                    clearIntervals();
                    setStatusUI('expired', 'hourglass-end', 'Expired', 'Kode telah kadaluarsa');
                    resetButton();
                    break;

                case 'failed':
                    setStatusUI('error', 'times-circle', 'Gagal', 'Bot gagal menghasilkan kode');
                    resetButton();
                    break;

                case 'existing':
                    setStatusUI('connected', 'check-double', 'Bot Sudah Ada', 'Bot sudah terhubung sebelumnya');
                    showElement(document.getElementById('connectedAction'));
                    resetButton();
                    break;

                case 'logged_out':
                    setStatusUI('error', 'sign-out-alt', 'Logged Out', 'Bot telah logout');
                    resetButton();
                    break;

                case 'stopped':
                    setStatusUI('error', 'stop-circle', 'Dihentikan', 'Bot sedang tidak aktif');
                    resetButton();
                    break;

                default:
                    if (data.code) {
                        clearInterval(checkInterval);
                        setStatusUI('success', 'gem', 'Kode Pairing', 'Masukkan kode di WhatsApp:');
                        document.getElementById('codeValue').innerText = data.code;
                        showElement(document.getElementById('codeDisplay'));
                        showElement(document.getElementById('whatsappAction'));
                        startCountdown(expiry);
                    } else {
                        setStatusUI('waiting', 'clock', 'Menunggu', `Status: ${data.status}`);
                    }
            }
        } catch (error) {
            console.error('Status check error:', error);
        }
    }

    document.getElementById('phone').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') requestPairing();
    });

    window.addEventListener('load', () => {
        const saved = localStorage.getItem('lastPhone');
        if (saved) document.getElementById('phone').value = saved;
    });
</script>
</body>
</html>
