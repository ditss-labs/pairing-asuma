<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asuma Bot - Pairing Code Generator</title>
    <meta name="description" content="Generate kode pairing WhatsApp dengan cepat dan mudah">
    <meta name="keywords" content="whatsapp bot, pairing code, wa bot generator">
    <meta name="author" content="Asuma Bot">
    <meta property="og:title" content="Asuma Bot - Pairing Code Generator">
    <meta property="og:description" content="Generate kode pairing WhatsApp dengan cepat dan mudah">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 560px;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            width: 90px;
            height: 90px;
            background: #151c2c;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo i {
            font-size: 3.5rem;
            color: #4f46e5;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(145deg, #ffffff, #a0aec0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #6b7a99;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card {
            background: rgba(18, 24, 41, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
            padding: 2.2rem;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #d1d9f0;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .input-label i {
            color: #4f46e5;
        }

        .input-field {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-field i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #4f46e5;
            font-size: 1.2rem;
        }

        .input-field input {
            width: 100%;
            padding: 1.2rem 1.2rem 1.2rem 3.5rem;
            background: #0f1629;
            border: 2px solid #262f47;
            border-radius: 1.5rem;
            font-size: 1.1rem;
            color: #ffffff;
            font-weight: 500;
        }

        .input-field input:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(145deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 2rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 2rem;
            background: #0f1629;
            border: 1px solid #262f47;
            display: none;
        }

        .status-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .status-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .status-icon.waiting { background: #2a2825; color: #fbbf24; }
        .status-icon.success { background: #1a2a1f; color: #4ade80; }
        .status-icon.connected { background: #1a2a33; color: #38bdf8; }
        .status-icon.expired { background: #2a1f1f; color: #f87171; }
        .status-icon.error { background: #2a1f1f; color: #f87171; }

        .status-title {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffffff;
        }

        .status-message {
            font-size: 0.9rem;
            color: #8a9bb5;
        }

        .code-box {
            background: #0a0f1c;
            border: 2px dashed #2a3450;
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: center;
            margin: 1.2rem 0;
        }

        .code-box span {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(145deg, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: monospace;
        }

        .timer {
            text-align: center;
            color: #8a9bb5;
            font-size: 0.95rem;
            margin: 1rem 0;
            background: #151e30;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            display: inline-block;
        }

        .timer i {
            color: #fbbf24;
            margin-right: 0.5rem;
        }

        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 1rem;
            border-radius: 2rem;
            font-weight: 600;
            margin: 1rem 0;
        }

        .connected-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            background: #1a2a33;
            color: #38bdf8;
            padding: 1.2rem;
            border-radius: 1.5rem;
            border: 1px solid #38bdf8;
            margin: 1rem 0;
        }

        .connected-badge i {
            font-size: 1.8rem;
        }

        .steps {
            background: #0a0f1c;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid #262f47;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #b4c3da;
            font-size: 0.9rem;
            padding: 0.5rem 0;
        }

        .step-item i {
            width: 20px;
            color: #4f46e5;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            color: #50607a;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-robot"></i>
            </div>
            <h1>Asuma Bot</h1>
            <p>Pairing Code Generator</p>
        </div>

        <div class="card">
            <div class="input-label">
                <i class="fas fa-phone-alt"></i>
                <span>Nomor WhatsApp</span>
            </div>
            <div class="input-field">
                <i class="fas fa-hashtag"></i>
                <input type="text" id="phone" placeholder="628123456789" value="447920601019">
            </div>

            <button class="btn" id="requestBtn">
                <i class="fas fa-key"></i>
                <span>Request Kode Pairing</span>
            </button>

            <div id="status" class="status hidden">
                <div class="status-header">
                    <div id="statusIcon" class="status-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div>
                        <div id="statusTitle" class="status-title">Menunggu</div>
                        <div id="statusMessage" class="status-message">Memproses permintaan...</div>
                    </div>
                </div>

                <div id="codeDisplay" class="code-box hidden">
                    <span id="codeValue">GNMC-S24C</span>
                </div>

                <div id="timerDisplay" class="timer hidden">
                    <i class="fas fa-hourglass-half"></i>
                    <span id="timerText">05:00</span>
                </div>

                <div id="whatsappAction" class="hidden">
                    <a href="#" id="whatsappLink" class="whatsapp-btn" target="_blank">
                        <i class="fab fa-whatsapp"></i> Buka WhatsApp
                    </a>
                    <div class="steps">
                        <div class="step-item"><i class="fas fa-mobile-alt"></i> Buka WhatsApp di HP</div>
                        <div class="step-item"><i class="fas fa-keyboard"></i> Masukkan kode pairing</div>
                        <div class="step-item"><i class="fas fa-sync-alt"></i> Tunggu hingga terhubung</div>
                    </div>
                </div>

                <div id="connectedAction" class="hidden">
                    <div class="connected-badge">
                        <i class="fas fa-check-circle"></i>
                        <div>
                            <div style="font-weight:700;">Bot Connected</div>
                            <div style="font-size:0.85rem;">WhatsApp siap digunakan</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2026 Asuma Bot
        </div>
    </div>

    <script>
        let pollInterval = null;
        let timerInterval = null;
        let currentPhone = '';

        const elements = {
            phone: document.getElementById('phone'),
            requestBtn: document.getElementById('requestBtn'),
            status: document.getElementById('status'),
            statusIcon: document.getElementById('statusIcon'),
            statusTitle: document.getElementById('statusTitle'),
            statusMessage: document.getElementById('statusMessage'),
            codeDisplay: document.getElementById('codeDisplay'),
            codeValue: document.getElementById('codeValue'),
            timerDisplay: document.getElementById('timerDisplay'),
            timerText: document.getElementById('timerText'),
            whatsappAction: document.getElementById('whatsappAction'),
            whatsappLink: document.getElementById('whatsappLink'),
            connectedAction: document.getElementById('connectedAction')
        };

        function stopAllIntervals() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function resetUI() {
            elements.status.classList.add('hidden');
            elements.codeDisplay.classList.add('hidden');
            elements.timerDisplay.classList.add('hidden');
            elements.whatsappAction.classList.add('hidden');
            elements.connectedAction.classList.add('hidden');
            stopAllIntervals();
        }

        function setStatus(type, icon, title, message) {
            elements.statusIcon.className = `status-icon ${type}`;
            elements.statusIcon.innerHTML = `<i class="fas ${icon}"></i>`;
            elements.statusTitle.innerText = title;
            elements.statusMessage.innerText = message;
            elements.status.classList.remove('hidden');
        }

        function enableButton() {
            elements.requestBtn.disabled = false;
            elements.requestBtn.innerHTML = '<i class="fas fa-key"></i><span>Request Kode Pairing</span>';
        }

        function disableButton(text) {
            elements.requestBtn.disabled = true;
            elements.requestBtn.innerHTML = `<div class="spinner"></div><span>${text}</span>`;
        }

        function startTimer(expiryTime) {
            const expiry = new Date(expiryTime);
            elements.timerDisplay.classList.remove('hidden');
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const now = new Date();
                const diff = expiry - now;
                
                if (diff <= 0) {
                    elements.timerText.innerText = '00:00';
                    clearInterval(timerInterval);
                    timerInterval = null;
                } else {
                    const mins = Math.floor(diff / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    elements.timerText.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                }
            }, 1000);
        }

        async function requestPairing() {
            const phone = elements.phone.value.replace(/\D/g, '');
            
            if (!phone || phone.length < 10) {
                alert('Nomor WhatsApp tidak valid (minimal 10 digit)');
                return;
            }

            currentPhone = phone;
            localStorage.setItem('lastPhone', phone);
            
            disableButton('Memproses...');
            resetUI();
            
            try {
                const response = await fetch('/api/pairing/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const result = await response.json();
                console.log('Request response:', result);
                
                if (result.success) {
                    setStatus('waiting', 'fa-clock', 'Permintaan Diterima', 'Menunggu kode dari bot...');
                    
                    stopAllIntervals();
                    pollInterval = setInterval(() => checkStatus(phone), 2000);
                } else {
                    setStatus('error', 'fa-exclamation-triangle', 'Gagal', result.message || 'Terjadi kesalahan');
                    enableButton();
                }
            } catch (error) {
                console.error('Request error:', error);
                setStatus('error', 'fa-bolt', 'Error', 'Gagal terhubung ke server');
                enableButton();
            }
        }

        async function checkStatus(phone) {
            try {
                const response = await fetch(`/api/pairing/status/${phone}`);
                const result = await response.json();
                
                console.log('Status response:', result);
                
                if (!result.success) return;
                
                const data = result.data;
                const status = data.status;
                
                if (status === 'connected' || status === 'existing') {
                    setStatus('connected', 'fa-check-circle', 'Bot Connected', 'WhatsApp berhasil terhubung');
                    elements.connectedAction.classList.remove('hidden');
                    elements.codeDisplay.classList.add('hidden');
                    elements.timerDisplay.classList.add('hidden');
                    elements.whatsappAction.classList.add('hidden');
                    stopAllIntervals();
                    enableButton();
                    return;
                }
                
                const now = new Date();
                const expiry = new Date(data.expiresAt);
                
                if (now > expiry && status !== 'connected' && status !== 'expired') {
                    setStatus('expired', 'fa-hourglass-end', 'Kode Expired', 'Waktu habis, request ulang');
                    stopAllIntervals();
                    enableButton();
                    return;
                }
                
                if (status === 'pairing_code' || data.code) {
                    setStatus('success', 'fa-gem', 'Kode Pairing Siap', 'Masukkan kode berikut di WhatsApp:');
                    elements.codeValue.innerText = data.code || 'GNMC-S24C';
                    elements.codeDisplay.classList.remove('hidden');
                    elements.whatsappAction.classList.remove('hidden');
                    elements.connectedAction.classList.add('hidden');
                    elements.whatsappLink.href = `https://wa.me/${phone}`;
                    
                    if (data.expiresAt) {
                        startTimer(data.expiresAt);
                    }
                    
                    if (pollInterval) {
                        clearInterval(pollInterval);
                        pollInterval = null;
                    }
                    
                    enableButton();
                    return;
                }
                
                if (status === 'processing' || status === 'pending') {
                    setStatus('waiting', 'fa-spinner fa-pulse', 'Memproses', 'Bot sedang menyiapkan kode...');
                } else if (status === 'sent') {
                    setStatus('waiting', 'fa-paper-plane', 'Kode Terkirim', 'Cek WhatsApp Anda');
                } else if (status === 'expired') {
                    setStatus('expired', 'fa-hourglass-end', 'Expired', 'Kode telah kadaluarsa');
                    stopAllIntervals();
                    enableButton();
                } else if (status === 'failed') {
                    setStatus('error', 'fa-times-circle', 'Gagal', 'Bot gagal menghasilkan kode');
                    stopAllIntervals();
                    enableButton();
                } else if (status === 'logged_out') {
                    setStatus('error', 'fa-sign-out-alt', 'Logged Out', 'Bot telah logout');
                    stopAllIntervals();
                    enableButton();
                } else if (status === 'stopped') {
                    setStatus('error', 'fa-stop-circle', 'Dihentikan', 'Bot tidak aktif');
                    stopAllIntervals();
                    enableButton();
                } else {
                    setStatus('waiting', 'fa-clock', 'Menunggu', `Status: ${status}`);
                }
            } catch (error) {
                console.error('Check status error:', error);
            }
        }

        elements.phone.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') requestPairing();
        });

        elements.requestBtn.addEventListener('click', requestPairing);

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('lastPhone');
            if (saved) elements.phone.value = saved;
        });
    </script>
</body>
</html>
