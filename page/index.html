<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asuma Bot - Pairing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-card {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .status-card.pending {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
        }

        .status-card.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .status-card.expired {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .status-card.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .status-card.info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        .code-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 8px;
            margin: 15px 0;
            border: 2px dashed #667eea;
            word-break: break-all;
        }

        .timer {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        .whatsapp-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Asuma Bot Pairing</h1>
        <p class="subtitle">Masukkan nomor WhatsApp untuk mendapatkan kode pairing</p>
        
        <div class="form-group">
            <label for="phone">Nomor WhatsApp</label>
            <input 
                type="text" 
                id="phone" 
                placeholder="Contoh: 628123456789"
                value="6281513607731"
            >
        </div>
        
        <button id="submitBtn" onclick="requestPairing()">
            Request Kode Pairing
        </button>
        
        <div id="statusCard" class="status-card">
            <div id="statusIcon">🤖</div>
            <div id="statusMessage"></div>
            <div id="codeDisplay" class="code-box" style="display: none;"></div>
            <div id="timerDisplay" class="timer"></div>
            <div id="whatsappHint" style="display: none; text-align: center; margin-top: 15px;">
                <a href="#" id="whatsappLink" class="whatsapp-link" target="_blank">
                    📱 Buka WhatsApp
                </a>
            </div>
        </div>
        
        <p class="info-text">
            Kode akan muncul di sini setelah diproses bot
        </p>
    </div>

    <script>
        let checkInterval;
        let countdownInterval;
        let currentPhone = '';

        async function requestPairing() {
            const phoneInput = document.getElementById('phone');
            const phone = phoneInput.value.replace(/\D/g, '');
            const btn = document.getElementById('submitBtn');
            const statusCard = document.getElementById('statusCard');
            const codeDisplay = document.getElementById('codeDisplay');
            
            if (!phone || phone.length < 10) {
                showStatus('error', 'Masukkan nomor yang valid (minimal 10 digit)');
                return;
            }

            currentPhone = phone;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Memproses...';
            
            statusCard.style.display = 'none';
            codeDisplay.style.display = 'none';
            document.getElementById('whatsappHint').style.display = 'none';
            
            if (checkInterval) clearInterval(checkInterval);
            if (countdownInterval) clearInterval(countdownInterval);

            try {
                const response = await fetch('/api/pairing/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('pending', '✅ Permintaan diterima! Menunggu kode pairing...');
                    
                    checkInterval = setInterval(() => checkStatus(phone), 3000);
                    
                    if (result.data && result.data.expiresAt) {
                        startCountdown(result.data.expiresAt);
                    }
                } else {
                    showStatus('error', '❌ ' + (result.message || 'Gagal memproses request'));
                    resetButton();
                }
                
            } catch (error) {
                showStatus('error', '❌ Gagal terhubung ke server');
                resetButton();
            }
        }

        async function checkStatus(phone) {
            try {
                const response = await fetch(`/api/pairing/status/${phone}`);
                const result = await response.json();
                
                if (!result.success) return;
                
                const data = result.data;
                
                const statusIcon = document.getElementById('statusIcon');
                
                if (data.status === 'sent' || data.status === 'pairing_code') {
                    clearInterval(checkInterval);
                    clearInterval(countdownInterval);
                    
                    statusIcon.innerHTML = '✅';
                    showStatus('success', '✅ Kode pairing berhasil didapatkan!');
                    
                    const codeDisplay = document.getElementById('codeDisplay');
                    codeDisplay.style.display = 'block';
                    codeDisplay.innerHTML = formatCode(data.code);
                    
                    document.getElementById('timerDisplay').innerHTML = '';
                    
                    const waLink = document.getElementById('whatsappLink');
                    waLink.href = `https://wa.me/${phone}?text=Kode%20pairing%20saya%20adalah%20${data.code}`;
                    document.getElementById('whatsappHint').style.display = 'block';
                    
                    resetButton();
                    
                } else if (data.status === 'connected') {
                    statusIcon.innerHTML = '🟢';
                    showStatus('info', '✅ Bot terhubung, sedang meminta kode...');
                    
                } else if (data.status === 'processing') {
                    statusIcon.innerHTML = '⏳';
                    showStatus('pending', '⏳ Bot sedang memproses...');
                    
                } else if (data.status === 'expired') {
                    clearInterval(checkInterval);
                    clearInterval(countdownInterval);
                    
                    statusIcon.innerHTML = '⏰';
                    showStatus('expired', '⏰ Waktu habis! Silakan request ulang.');
                    document.getElementById('codeDisplay').style.display = 'none';
                    document.getElementById('whatsappHint').style.display = 'none';
                    resetButton();
                    
                } else if (data.status === 'pending') {
                    statusIcon.innerHTML = '⏳';
                    showStatus('pending', '⏳ Menunggu diproses...');
                    
                } else if (data.status === 'failed') {
                    statusIcon.innerHTML = '❌';
                    showStatus('error', '❌ Gagal memproses, coba lagi nanti');
                    
                } else {
                    statusIcon.innerHTML = '🤖';
                    showStatus('pending', `⏳ Status: ${data.status}`);
                }
                
            } catch (error) {
                console.error('Check status error:', error);
            }
        }

        function startCountdown(expiresAt) {
            const timerDisplay = document.getElementById('timerDisplay');
            
            countdownInterval = setInterval(() => {
                const now = new Date();
                const expiry = new Date(expiresAt);
                const diff = expiry - now;
                
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    timerDisplay.innerHTML = 'Waktu habis';
                    return;
                }
                
                const minutes = Math.floor(diff / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                timerDisplay.innerHTML = `⏱️ Sisa waktu: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                
            }, 1000);
        }

        function formatCode(code) {
            if (!code) return 'Kode tidak tersedia';
            
            if (code.includes('-')) {
                return code;
            }
            
            const match = code.match(/.{1,4}/g);
            return match ? match.join('-') : code;
        }

        function showStatus(type, message) {
            const statusCard = document.getElementById('statusCard');
            const statusMessage = document.getElementById('statusMessage');
            
            statusCard.style.display = 'block';
            statusCard.className = `status-card ${type}`;
            statusMessage.innerHTML = message;
        }

        function resetButton() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.innerHTML = 'Request Kode Pairing';
        }

        function resetForm() {
            if (checkInterval) clearInterval(checkInterval);
            if (countdownInterval) clearInterval(countdownInterval);
            
            document.getElementById('phone').value = '';
            document.getElementById('statusCard').style.display = 'none';
            document.getElementById('codeDisplay').style.display = 'none';
            document.getElementById('whatsappHint').style.display = 'none';
            resetButton();
        }

        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                requestPairing();
            }
        });

        window.addEventListener('load', function() {
            const savedPhone = localStorage.getItem('lastPhone');
            if (savedPhone) {
                document.getElementById('phone').value = savedPhone;
            }
        });
    </script>
</body>
</html>
