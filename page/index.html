<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asuma Bot - Pairing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-card {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            transition: all 0.3s ease;
        }

        .status-card.pending {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
        }

        .status-card.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .status-card.expired {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .status-card.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .status-card.info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        .status-card.connected {
            background: #cce5ff;
            border: 1px solid #b8daff;
            color: #004085;
            animation: pulse 2s infinite;
        }

        .code-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 8px;
            margin: 15px 0;
            border: 2px dashed #667eea;
            word-break: break-all;
        }

        .timer {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes pulse {
            0% { opacity: 1; background: #cce5ff; }
            50% { opacity: 0.8; background: #b8daff; }
            100% { opacity: 1; background: #cce5ff; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        .whatsapp-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            position: relative;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .step .circle {
            width: 40px;
            height: 40px;
            background: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .step.active .circle {
            background: #667eea;
            transform: scale(1.1);
        }

        .step.completed .circle {
            background: #28a745;
        }

        .step .label {
            font-size: 12px;
            color: #666;
        }

        .step.active .label {
            color: #667eea;
            font-weight: bold;
        }

        .progress-bar {
            height: 4px;
            background: #e0e0e0;
            position: relative;
            margin: -20px 0 30px;
            border-radius: 2px;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .debug-info {
            font-size: 11px;
            color: #999;
            margin-top: 15px;
            padding: 10px;
            border-top: 1px dashed #ddd;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Asuma Bot Pairing</h1>
        <p class="subtitle">Masukkan nomor WhatsApp untuk mendapatkan kode pairing</p>
        
        <div class="form-group">
            <label for="phone">Nomor WhatsApp</label>
            <input 
                type="text" 
                id="phone" 
                placeholder="Contoh: 628123456789"
                value="447920601019"
            >
        </div>
        
        <button id="submitBtn" onclick="requestPairing()">
            Request Kode Pairing
        </button>
        
        <!-- Step Indicator -->
        <div class="step-indicator" id="stepIndicator" style="display: none;">
            <div class="step" id="step1">
                <div class="circle">1</div>
                <div class="label">Request</div>
            </div>
            <div class="step" id="step2">
                <div class="circle">2</div>
                <div class="label">Bot Connect</div>
            </div>
            <div class="step" id="step3">
                <div class="circle">3</div>
                <div class="label">Kode Siap</div>
            </div>
        </div>
        
        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div id="statusCard" class="status-card">
            <div id="statusIcon" class="status-icon">🤖</div>
            <div id="statusMessage"></div>
            <div id="codeDisplay" class="code-box" style="display: none;"></div>
            <div id="timerDisplay" class="timer"></div>
            <div id="whatsappHint" style="display: none; text-align: center;">
                <a href="#" id="whatsappLink" class="whatsapp-link" target="_blank">
                    📱 Buka WhatsApp dan Masukkan Kode
                </a>
            </div>
            <div id="lastUpdate" style="font-size: 11px; color: #999; margin-top: 10px;"></div>
        </div>
        
        <p class="info-text">
            Status akan update otomatis setiap 3 detik
        </p>
    </div>

    <script>
        let checkInterval;
        let countdownInterval;
        let currentPhone = '';
        let retryCount = 0;
        const MAX_RETRY = 60;
        let lastStatus = '';

        function updateStep(step) {
            const stepIndicator = document.getElementById('stepIndicator');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            stepIndicator.style.display = 'flex';
            progressBar.style.display = 'block';
            
            document.getElementById('step1').classList.remove('active', 'completed');
            document.getElementById('step2').classList.remove('active', 'completed');
            document.getElementById('step3').classList.remove('active', 'completed');
            
            if (step >= 1) {
                document.getElementById('step1').classList.add('completed');
                progressFill.style.width = '33%';
            }
            if (step >= 2) {
                document.getElementById('step2').classList.add('completed');
                progressFill.style.width = '66%';
            }
            if (step >= 3) {
                document.getElementById('step3').classList.add('completed');
                progressFill.style.width = '100%';
            }
            
            if (step === 1) document.getElementById('step1').classList.add('active');
            if (step === 2) document.getElementById('step2').classList.add('active');
            if (step === 3) document.getElementById('step3').classList.add('active');
        }

        async function requestPairing() {
            const phoneInput = document.getElementById('phone');
            const phone = phoneInput.value.replace(/\D/g, '');
            const btn = document.getElementById('submitBtn');
            const statusCard = document.getElementById('statusCard');
            const codeDisplay = document.getElementById('codeDisplay');
            
            if (!phone || phone.length < 10) {
                showStatus('error', 'Masukkan nomor yang valid (minimal 10 digit)');
                return;
            }

            currentPhone = phone;
            retryCount = 0;
            lastStatus = '';
            
            localStorage.setItem('lastPhone', phone);
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Memproses...';
            
            statusCard.style.display = 'none';
            codeDisplay.style.display = 'none';
            document.getElementById('whatsappHint').style.display = 'none';
            
            if (checkInterval) clearInterval(checkInterval);
            if (countdownInterval) clearInterval(countdownInterval);

            try {
                const response = await fetch('/api/pairing/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    updateStep(1);
                    showStatus('pending', '✅ Permintaan diterima!\n⏳ Menunggu bot merespon...');
                    
                    checkInterval = setInterval(() => checkStatus(phone), 3000);
                    
                    if (result.data && result.data.expiresAt) {
                        startCountdown(result.data.expiresAt);
                    }
                } else {
                    showStatus('error', '❌ ' + (result.message || 'Gagal memproses request'));
                    resetButton();
                }
                
            } catch (error) {
                showStatus('error', '❌ Gagal terhubung ke server');
                resetButton();
            }
        }

        async function checkStatus(phone) {
            try {
                retryCount++;
                
                const response = await fetch(`/api/pairing/status/${phone}`);
                const result = await response.json();
                
                if (!result.success) return;
                
                const data = result.data;
                const statusIcon = document.getElementById('statusIcon');
                
                document.getElementById('lastUpdate').innerHTML = `Update terakhir: ${new Date().toLocaleTimeString()}`;
                
                if (lastStatus !== data.status) {
                    console.log(`Status berubah: ${lastStatus} -> ${data.status}`);
                    lastStatus = data.status;
                }
                
                if (data.code) {
                    clearInterval(checkInterval);
                    clearInterval(countdownInterval);
                    
                    statusIcon.innerHTML = '✅';
                    updateStep(3);
                    showStatus('success', '✅ Kode pairing berhasil didapatkan!\n\nMasukkan kode ini di WhatsApp:');
                    
                    const codeDisplay = document.getElementById('codeDisplay');
                    codeDisplay.style.display = 'block';
                    codeDisplay.innerHTML = formatCode(data.code);
                    
                    document.getElementById('timerDisplay').innerHTML = '';
                    
                    const waLink = document.getElementById('whatsappLink');
                    waLink.href = `https://wa.me/${phone}?text=Kode%20pairing%20saya%20adalah%20${data.code}`;
                    document.getElementById('whatsappHint').style.display = 'block';
                    
                    resetButton();
                    return;
                }
                
                switch(data.status) {
                    case 'connected':
                        statusIcon.innerHTML = '🟢';
                        updateStep(2);
                        showStatus('connected', '🟢 BOT CONNECT!\n\nBot WhatsApp sudah terhubung\n⏳ Sedang meminta kode pairing...');
                        break;
                        
                    case 'pairing_code':
                    case 'sent':
                        if (data.code) {
                            clearInterval(checkInterval);
                            clearInterval(countdownInterval);
                            
                            statusIcon.innerHTML = '✅';
                            updateStep(3);
                            showStatus('success', '✅ Kode pairing berhasil didapatkan!\n\nMasukkan kode ini di WhatsApp:');
                            
                            const codeDisplay = document.getElementById('codeDisplay');
                            codeDisplay.style.display = 'block';
                            codeDisplay.innerHTML = formatCode(data.code);
                            
                            document.getElementById('timerDisplay').innerHTML = '';
                            
                            const waLink = document.getElementById('whatsappLink');
                            waLink.href = `https://wa.me/${phone}?text=Kode%20pairing%20saya%20adalah%20${data.code}`;
                            document.getElementById('whatsappHint').style.display = 'block';
                            
                            resetButton();
                        }
                        break;
                        
                    case 'processing':
                        statusIcon.innerHTML = '⏳';
                        updateStep(1);
                        showStatus('pending', '⏳ Bot sedang memproses...\n\nMempersiapkan bot clone');
                        break;
                        
                    case 'expired':
                        clearInterval(checkInterval);
                        clearInterval(countdownInterval);
                        
                        statusIcon.innerHTML = '⏰';
                        updateStep(1);
                        showStatus('expired', '⏰ Waktu habis!\n\nSilakan request ulang.');
                        document.getElementById('codeDisplay').style.display = 'none';
                        document.getElementById('whatsappHint').style.display = 'none';
                        resetButton();
                        break;
                        
                    case 'pending':
                        statusIcon.innerHTML = '⏳';
                        updateStep(1);
                        showStatus('pending', '⏳ Menunggu diproses...\n\nBot akan segera merespon');
                        break;
                        
                    case 'failed':
                        statusIcon.innerHTML = '❌';
                        updateStep(1);
                        showStatus('error', '❌ Gagal memproses\n\nCoba lagi nanti');
                        break;
                        
                    default:
                        statusIcon.innerHTML = '🤖';
                        showStatus('pending', `⏳ Status: ${data.status}`);
                }
                
                if (retryCount >= MAX_RETRY) {
                    clearInterval(checkInterval);
                    clearInterval(countdownInterval);
                    showStatus('expired', '⏰ Waktu habis (timeout)\n\nSilakan request ulang.');
                    resetButton();
                }
                
            } catch (error) {
                console.error('Check status error:', error);
            }
        }

        function startCountdown(expiresAt) {
            const timerDisplay = document.getElementById('timerDisplay');
            
            countdownInterval = setInterval(() => {
                const now = new Date();
                const expiry = new Date(expiresAt);
                const diff = expiry - now;
                
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    timerDisplay.innerHTML = '⏰ Waktu habis';
                    return;
                }
                
                const minutes = Math.floor(diff / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                timerDisplay.innerHTML = `⏱️ Sisa waktu: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                
            }, 1000);
        }

        function formatCode(code) {
            if (!code) return 'Kode tidak tersedia';
            
            if (code.includes('-')) {
                return code;
            }
            
            const match = code.match(/.{1,4}/g);
            return match ? match.join('-') : code;
        }

        function showStatus(type, message) {
            const statusCard = document.getElementById('statusCard');
            const statusMessage = document.getElementById('statusMessage');
            
            statusCard.style.display = 'block';
            statusCard.className = `status-card ${type}`;
            statusMessage.innerHTML = message.replace(/\n/g, '<br>');
        }

        function resetButton() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.innerHTML = 'Request Kode Pairing';
        }

        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                requestPairing();
            }
        });

        window.addEventListener('load', function() {
            const savedPhone = localStorage.getItem('lastPhone');
            if (savedPhone) {
                document.getElementById('phone').value = savedPhone;
            }
        });
    </script>
</body>
</html>
